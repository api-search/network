name = "apis-io-agent-readiness"
main = "src/worker.js"
compatibility_date = "2026-04-01"

# Routes cover the apex and every subdomain in the apis.io network.
routes = [
  { pattern = "apis.io/*", zone_name = "apis.io" },
  { pattern = "*.apis.io/*", zone_name = "apis.io" },
]

[observability]
enabled = true
